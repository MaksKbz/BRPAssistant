name: PR Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify:
    name: Verify PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Check wrapper executable
        run: |
          chmod +x ./gradlew || true
          ls -lh ./gradlew || echo "gradlew not found, using bare gradle"
          ls -lh gradle/wrapper/ || echo "wrapper dir missing"

      - name: Run unit tests + lint + debug build
        run: |
          gradle testDebugUnitTest lintDebug assembleDebug --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            app/build/test-results/
            app/build/reports/
          retention-days: 7
