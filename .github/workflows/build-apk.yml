name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          echo "=== Список всех APK в проекте ==="
          find . -name "*.apk" 2>/dev/null || echo "APK не найден"
          echo "=== Содержимое app/build (top 40 строк) ==="
          find app/build -maxdepth 5 2>/dev/null | head -40 || echo "app/build пустой или отсутствует"
          APK_PATH=$(find . -name "*.apk" -path "*/debug/*" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found after build!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Decode stable keystore and sign APK
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.p12
            APK="${{ steps.find_apk.outputs.APK_PATH }}"
            BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
            "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
              --ks release.p12 \
              --ks-type PKCS12 \
              --ks-key-alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.RELEASE_KEY_PASSWORD }}" \
              "$APK"
            echo "✅ APK успешно подписан стабильным релизным ключом"
          else
            echo "⚠️ Секрет RELEASE_KEYSTORE_BASE64 не найден, оставлена debug подпись"
          fi

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "unknown")
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Rename APK
        id: rename
        run: |
          SRC="${{ steps.find_apk.outputs.APK_PATH }}"
          DIR=$(dirname "$SRC")
          DEST="$DIR/BRPAssistant-v${{ steps.version.outputs.VERSION_NAME }}-${{ steps.version.outputs.SHORT_SHA }}-debug.apk"
          mv "$SRC" "$DEST"
          echo "FINAL_APK=$DEST" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRPAssistant-v${{ steps.version.outputs.VERSION_NAME }}-${{ steps.version.outputs.SHORT_SHA }}-debug
          path: ${{ steps.rename.outputs.FINAL_APK }}
          retention-days: 7

      - name: Upload Room schema export
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: app/schemas/
          retention-days: 7

      - name: Post build summary
        run: |
          echo "## ✅ APK собран успешно" >> $GITHUB_STEP_SUMMARY
          echo "- **Версия:** v${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Коммит:** ${{ steps.version.outputs.SHORT_SHA }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Тип:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "- **Хранится:** 7 дней" >> $GITHUB_STEP_SUMMARY
          echo "Скачать APK: Actions → последний run → Artifacts" >> $GITHUB_STEP_SUMMARY
