name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      # Release-сборка с debug-подписью.
      # signingConfig не задан в build.gradle.kts, поэтому
      # assembleRelease выдаёт unsigned APK — подписываем
      # debug-ключом через apksigner.
      # Цель: проверить что R8/ProGuard не ломает сборку
      # и получить устанавливаемый APK.
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx4g"

      - name: Sign APK with debug key
        run: |
          # Генерируем debug keystore
          keytool -genkey -v \
            -keystore debug.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          # Находим unsigned APK
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK"

          # Подписываем
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks debug.jks \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            "$APK"

          echo "APK signed successfully"
          ls -lh app-release-signed.apk

      - name: Verify APK signature
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner verify \
            --verbose app-release-signed.apk

      - name: Show APK info
        run: |
          echo "=== APK size ==="
          ls -lh app-release-signed.apk
          echo "=== Build outputs ==="
          find app/build/outputs -type f -name "*.apk" | xargs ls -lh 2>/dev/null || true
          echo "=== Mapping file (ProGuard) ==="
          find app/build/outputs/mapping -type f 2>/dev/null | head -5 || echo "No mapping file found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRPAssistant-release-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 14

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proguard-mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/
          retention-days: 14
