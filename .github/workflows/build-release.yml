name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Xmx4g"

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v \
            -keystore debug.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found APK: $APK"

          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks debug.jks \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            "$APK"

          echo "Signed APK size:"
          ls -lh app-release-signed.apk

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify --verbose app-release-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BRPAssistant-release-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 14

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proguard-mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/
          retention-days: 14
