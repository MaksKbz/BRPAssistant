name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "gradle-wrapper.jar downloaded: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon --warning-mode all

      - name: List APK outputs
        run: find app/build/outputs/apk -name '*.apk' | xargs ls -lh 2>/dev/null || echo 'No APK found'

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v \
            -keystore debug.jks \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null

          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "Signing: $APK"

          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks debug.jks \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            "$APK"

          echo "=== Signed APK ==="
          ls -lh app-release-signed.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose app-release-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRPAssistant-release-${{ github.run_number }}
          path: app-release-signed.apk
          retention-days: 30

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proguard-mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          APK=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(ls -lh "$APK" | awk '{print $5}')
            echo "- APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
