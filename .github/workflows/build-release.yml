name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Bump patch version
        id: bump
        run: |
          GRADLE=app/build.gradle.kts

          OLD_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE")
          OLD_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_CODE=$((OLD_CODE + 1))

          echo "🔼 Версия: $OLD_NAME → $NEW_NAME  |  versionCode: $OLD_CODE → $NEW_CODE"

          sed -i "s/versionName = \"${OLD_NAME}\"/versionName = \"${NEW_NAME}\"/" "$GRADLE"
          sed -i "s/versionCode = ${OLD_CODE}/versionCode = ${NEW_CODE}/" "$GRADLE"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$GRADLE"
          git commit -m "chore: bump version $OLD_NAME → $NEW_NAME (versionCode $NEW_CODE) [skip ci]"
          git push

          echo "new_version=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "new_code=$NEW_CODE"    >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: List APK outputs
        run: find app/build/outputs/apk -name '*.apk' | xargs ls -lh 2>/dev/null || echo 'No APK found'

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.p12
          echo "Keystore decoded: $(ls -lh release.p12)"

      - name: Sign APK with stable release key
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then echo "ERROR: APK not found!"; exit 1; fi

          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks release.p12 \
            --ks-type PKCS12 \
            --ks-key-alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --out app-release-signed.apk \
            "$APK"
          ls -lh app-release-signed.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose app-release-signed.apk

      - name: Rename APK
        run: |
          mv app-release-signed.apk \
            BRPAssistant-v${{ steps.bump.outputs.new_version }}.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "BRPAssistant v${{ steps.bump.outputs.new_version }} — актуальная"
          body: |
            ## BRPAssistant v${{ steps.bump.outputs.new_version }}

            ${{ github.event.head_commit.message }}

            ### Установка
            1. Скачайте APK ниже
            2. На Android: Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Откройте скачанный APK и установите

            ### Требования
            - Android 11+ (API 30)
            - 2 ГБ RAM минимум (рекомендуется 4+ ГБ для офлайн-моделей)
          files: BRPAssistant-v${{ steps.bump.outputs.new_version }}.apk
          make_latest: true
          generate_release_notes: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proguard-mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### ✅ v${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode:** ${{ steps.bump.outputs.new_code }}" >> $GITHUB_STEP_SUMMARY
          APK="BRPAssistant-v${{ steps.bump.outputs.new_version }}.apk"
          if [ -f "$APK" ]; then
            SIZE=$(ls -lh "$APK" | awk '{print $5}')
            echo "- **Размер APK:** $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          echo "📦 https://github.com/${{ github.repository }}/releases/latest" >> $GITHUB_STEP_SUMMARY
