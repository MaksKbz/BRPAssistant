name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace --no-daemon

      - name: List APK outputs
        run: find app/build/outputs/apk -name '*.apk' | xargs ls -lh 2>/dev/null || echo 'No APK found'

      # STABLE SIGNING: используем единый release keystore из GitHub Secrets.
      # Все сборки подписываются одним ключом → APK можно обновлять поверх
      # старой версии без удаления. Загруженные модели сохраняются.
      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.p12
          echo "Keystore decoded: $(ls -lh release.p12)"

      - name: Sign APK with stable release key
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          echo "Signing: $APK"

          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" sign \
            --ks release.p12 \
            --ks-type PKCS12 \
            --ks-key-alias "${{ secrets.RELEASE_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.RELEASE_KEY_PASSWORD }}" \
            --out app-release-signed.apk \
            "$APK"

          echo "=== Signed APK ==="
          ls -lh app-release-signed.apk

      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose app-release-signed.apk

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "unknown")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRPAssistant-v${{ steps.version.outputs.version }}-release
          path: app-release-signed.apk
          retention-days: 30

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proguard-mapping-${{ github.run_number }}
          path: app/build/outputs/mapping/
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### ✅ Release APK v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ steps.version.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          APK=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(ls -lh "$APK" | awk '{print $5}')
            echo "- APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
